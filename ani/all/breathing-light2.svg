<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400" width="100%" height="100%">
    <defs>
        <!-- 關鍵：將樣式與 Keyframes 放在 defs 裡 -->
        <style>
            @keyframes growAndFadeInSVG {
                0% { transform: scale(0); opacity: 1; }
                90% { transform: scale(1); opacity: 1; }   /* 第 9 秒 (90%) 放大到 100% */
                100% { transform: scale(1); opacity: 0; }  /* 最後 1 秒 (90%~100%) 消失 */
            }
            .pulse-circle {
                /* 非常關鍵：確保 SVG 內部縮放原點在畫布中心 (200, 200) */
                transform-origin: 200px 200px;
                animation: growAndFadeInSVG 10s linear infinite;
                fill: rgba(255, 255, 255, 0.3); /* 對應 bg-white/30 */
            }
            /* 5 個圓形的特定延遲 Class (每 2s 一個) */
            .delay-svg-1 { animation-delay: 0ms; }
            .delay-svg-2 { animation-delay: 2000ms; }
            .delay-svg-3 { animation-delay: 4000ms; }
            .delay-svg-4 { animation-delay: 6000ms; }
            .delay-svg-5 { animation-delay: 8000ms; }
        </style>
    </defs>
    
    <!-- 圓形容器：所有圓形都完美重疊在中心 (200, 200) -->
    <g>
        <circle cx="200" cy="200" r="190" class="pulse-circle delay-svg-1" />
        <circle cx="200" cy="200" r="190" class="pulse-circle delay-svg-2" />
        <circle cx="200" cy="200" r="190" class="pulse-circle delay-svg-3" />
        <circle cx="200" cy="200" r="190" class="pulse-circle delay-svg-4" />
        <circle cx="200" cy="200" r="190" class="pulse-circle delay-svg-5" />
    </g>
</svg>

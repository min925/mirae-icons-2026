<!DOCTYPE html>
<html lang="en">
<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<title>Mirae Assets - animation</title>
	<script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
</head>
<body class="flex flex-col gap-8 p-4 w-full">
	<div class="w-full bg-black text-white text-center p-2">ALL PAGES</div>
	<div class="flex flex-row gap-4 items-center">
		<div class="w-[180px]">
			line background
		</div>
		<!-- fill the rest space -->
		<img class="flex-1 min-w-0 w-full h-auto object-cover" src="./ani/bg-line.svg" alt="">
	</div>
	<div class="w-full bg-black text-white text-center p-2">HOMEPAGE</div>
	<div class="flex flex-row gap-4 items-center">
		<div class="w-[180px]">
			Banner
		</div>
		<div class="relative w-full overflow-hidden">
			<img class="w-full" src="./ani/banner/homepage-d.svg" alt="">
			<img class="absolute top-[36%] left-1/2 transform -translate-x-1/2 w-[46%]" src="./ani/banner/globe.svg" alt="">
			<div class="absolute bottom-0 left-0 w-full min-h-0 pb-[18%] bg-gradient-to-b from-[#001932]/0 to-[#001932]"></div>
		</div>
	</div>
	<div class="flex flex-row gap-4 items-center">
		<div class="w-[180px]">
			Feature Bar
		</div>
		<img src="./ani/feature/global-market-access-to-hk.svg" alt="">
		<img src="./ani/feature/in-depth-insights.svg" alt="">
		<img src="./ani/feature/next-gen-investing-wealth.svg" alt="">
		<img src="./ani/feature/trust-regulation-security.svg" alt="">
	</div>
	<div class="flex flex-row gap-4 items-center">
		<div class="w-[180px]">
			Download Bar
		</div>
		<img src="./ani/download/range-of-products.svg" alt="">
		<img src="./ani/download/real-time-market-data.svg" alt="">
		<img src="./ani/download/smart-trading-tools.svg" alt="">
		<img src="./ani/download/secure-regulated.svg" alt="">
	</div>
	<div class="flex flex-row gap-4 items-center">
		<div class="w-[180px]">
			Global Opportunities
		</div>
		<img src="./ani/globe.svg" alt="">
	</div>
	<div class="w-full bg-black text-white text-center p-2">THE APP</div>
	<div class="flex flex-row gap-4 items-center">
		<div class="w-[180px]">
			Feature Bar
		</div>
		<img src="./ani/feature/global-market-access-to-hk.svg" alt="">
		<img src="./ani/feature/diversified-products.svg" alt="">
		<img src="./ani/feature/smart-investing.svg" alt="">
		<img src="./ani/feature/trust-regulation-security.svg" alt="">
	</div>
	<div class="flex flex-row gap-4 items-center">
		<div class="w-[180px]">
			Our Worldwide Network
		</div>
		<img class="flex-1 min-w-0 w-full h-auto object-cover" src="./ani/the-app/worldwide-network.svg" alt="">
	</div>
	<div class="w-full bg-black text-white text-center p-2">GET STARTED</div>
	<div class="flex flex-row gap-4 items-center">
		<div class="w-[180px]">
			5 steps bar
		</div>
		<img src="./ani/steps/download-maps.svg" alt="">
		<img src="./ani/steps/create-account.svg" alt="">
		<img src="./ani/steps/complete-verification.svg" alt="">
		<img src="./ani/steps/complete-setup.svg" alt="">
		<img src="./ani/steps/global-markets.svg" alt="">
	</div>
	<div class="flex flex-row gap-4 items-center">
		<div class="w-[180px]">
			Need help getting started?
		</div>
		<div class="relative max-w-[600px] w-full">
			<img src="./ani/get-started/opening-account.png" alt="">
			<img class="absolute left-[2.7%] top-[12.2%] w-[23%]" src="./ani/get-started/submitted.svg" alt="">
		</div>
	</div>
	<div class="flex flex-row gap-4 items-center">
		<div class="w-[180px]">
			New to Investing?
		</div>
		<div class="relative max-w-[600px] w-full">
			<img src="./ani/get-started/newbie.png" alt="">

		<div class="w-[180px]">
			Contact Bar
		</div>
		<img src="./ani/contact/phone.svg" alt="">
		<img src="./ani/contact/email.svg" alt="">
		<img src="./ani/contact/working-hours.svg" alt="">
	</div>
	<div class="flex flex-row gap-4 items-center">
		<div class="w-[180px]">
			Helpful Resources
		</div>
		<img src="./ani/help/account-opening.svg" alt="">
		<img src="./ani/help/user-guide.svg" alt="">
		<img src="./ani/help/fees.svg" alt="">
		<img src="./ani/help/form-download.svg" alt="">
		<img src="./ani/help/document-security.svg" alt="">
		<img src="./ani/help/useful-link.svg" alt="">
